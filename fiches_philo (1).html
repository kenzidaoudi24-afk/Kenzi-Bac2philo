    margin-bottom: 10px;
    font-size: 13px;

    align-items: flex-start;

  .sujet-icon {

  .sujet-text {
    font-size: 13px;
    color: var(--text);

    border-radius: 8px;

  .piege-icon { font-size: 14px; }
  .piege-text { font-size: 12px; line-height: 1.45; color: #8B3535; }

  .keywords {
    display: flex;

    padding: 4px 12px;
    font-size: 12px;

  }

  .section-divider {
    border: none;

    margin: 0;
  }

  .notion-section {
    display: none;
  }

  .notion-section.visible {
    display: block;
  }
</style>

// Render nav
const navBar = document.getElementById('navBar');
notions.forEach((n, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.textContent = n.emoji + ' ' + n.titre;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.notion-section').forEach(s => s.classList.remove('visible'));
    document.getElementById('notion-' + n.id).classList.add('visible');
    document.getElementById('notion-' + n.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  navBar.appendChild(btn);
});

// Render cards
const main = document.getElementById('main');
notions.forEach((n, i) => {
  const section = document.createElement('div');
  section.className = 'notion-section' + (i === 0 ? ' visible' : '');
  section.id = 'notion-' + n.id;

  section.innerHTML = `
    <div class="notion-header">
      <h2>${n.emoji} ${n.titre.toUpperCase()}</h2>
      <p class="subtitle">${n.subtitle}</p>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="section" style="border-right: 1px solid var(--border);">
          <div class="section-title"><span class="icon">📖</span> 1. Définitions essentielles</div>
          ${n.definitions.map(d => `
            <div class="def-item">
              <div class="def-term">${d.terme}</div>
              <div class="def-text">${d.def}</div>
            </div>
          `).join('')}
        </div>
        <div class="section">
          <div class="section-title"><span class="icon">👤</span> 2. Auteurs clés</div>
          ${n.auteurs.map(a => `
            <div class="author-card">
              <div class="author-avatar">${a.emoji}</div>
              <div>
                <div class="author-name">${a.nom}</div>
                <div class="author-period">${a.periode}</div>
                <div class="author-quote">${a.idee}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <hr class="section-divider">
      <div class="grid-2">
        <div class="section" style="border-right: 1px solid var(--border);">
          <div class="section-title"><span class="icon">⚖️</span> 3. Distinctions importantes</div>
          ${n.distinctions.map(d => `
            <div>
              <div class="distinction">
                <span class="distinction-term">${d.a}</span>
                <span class="distinction-arrow">↔</span>
                <span class="distinction-term">${d.b}</span>
              </div>
              <div class="distinction-desc">${d.desc}</div>
            </div>
          `).join('<br>')}
        </div>
        <div class="section">
          <div class="section-title"><span class="icon">💭</span> 4. Sujets classiques du bac</div>
          ${n.sujets.map(s => `
            <div class="sujet">
              <div class="sujet-icon">❓</div>
              <div class="sujet-text">${s}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <hr class="section-divider">
      <div class="section">
        <div class="section-title"><span class="icon">⚠️</span> 5. Pièges à éviter</div>
        <div class="grid-2">
          ${n.pieges.map(p => `
            <div class="piege">
              <div class="piege-icon">⚠️</div>
              <div class="piege-text">${p}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <hr class="section-divider">
      <div class="section-title" style="padding: 12px 20px 0; margin-bottom: 0;"><span class="icon">🏷️</span> 6. Mots-clés</div>
      <div class="keywords">
        ${n.mots.map(m => `<span class="keyword">${m}</span>`).join('')}
      </div>
    </div>
  `;

  main.appendChild(section);
});
</script>
